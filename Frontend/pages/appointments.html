<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randevu - Nail & Lash Studio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">
                    <h1>✨ Nail & Lash Studio</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="../index.html">Ana Sayfa</a></li>
                    <li><a href="services.html">Hizmetler</a></li>
                    <li><a href="appointments.html" class="active">Randevu</a></li>
                    <li id="authMenu">
                        <a href="login.html">Giriş Yap</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Appointments Section -->
    <section class="appointments-section">
        <div class="container">
            <h1>Randevu Sistemi</h1>
            
            <div class="appointment-form-container">
                <form id="appointmentForm" class="appointment-form">
                    <div class="form-group">
                        <label for="service">Hizmet Seçin *</label>
                        <select id="service" required>
                            <option value="">-- Hizmet Seçin --</option>
                            <option value="1">Manikür</option>
                            <option value="2">Pedikür</option>
                            <option value="3">Lifting</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="appointmentDate">Tarih Seçin *</label>
                        <input type="date" id="appointmentDate" required min="">
                    </div>

                    <div class="form-group">
                        <label for="appointmentTime">Saat Seçin *</label>
                        <select id="appointmentTime" required>
                            <option value="">-- Saat Seçin --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="firstName">Adınız *</label>
                        <input type="text" id="firstName" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Soyadınız *</label>
                        <input type="text" id="lastName" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-posta *</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Telefon *</label>
                        <input type="tel" id="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="notes">Notlar</label>
                        <textarea id="notes" rows="4" placeholder="Ek notlar yazınız..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Randevu Oluştur</button>
                </form>
            </div>

            <!-- Appointment History -->
            <div class="appointment-history" id="appointmentHistory" style="display:none;">
                <h2>Geçmiş Randevularım</h2>
                <div class="history-list" id="historyList">
                    <!-- Appointments will be loaded here -->
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Nail & Lash Studio. Tüm Hakları Saklıdır.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script src="../js/appointments.js"></script>
</body>
</html>
