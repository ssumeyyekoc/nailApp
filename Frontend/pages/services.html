<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hizmetler - Nail & Lash Studio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">
                    <h1>✨ Nail & Lash Studio</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="../index.html">Ana Sayfa</a></li>
                    <li><a href="services.html" class="active">Hizmetler</a></li>
                    <li><a href="appointments.html">Randevu</a></li>
                    <li id="authMenu">
                        <a href="login.html">Giriş Yap</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Services Section -->
    <section class="services-section">
        <div class="container">
            <h1>Hizmetlerimiz</h1>
            
            <!-- Category Filter -->
            <div class="filter-section">
                <button class="filter-btn active" data-category="all">Tümü</button>
                <button class="filter-btn" data-category="1">Jel</button>
                <button class="filter-btn" data-category="2">Protez</button>
                <button class="filter-btn" data-category="3">Nail Art</button>
                <button class="filter-btn" data-category="4">Kirpik Lifting</button>
            </div>

            <!-- Services Grid -->
            <div class="services-full-grid" id="servicesFullGrid">
                <div class="service-detail-card">
                    <h3>Jel Tırnak Uygulaması</h3>
                    <p class="description">Yüksek kaliteli jel malzemeleri ile uzun ömürlü ve güzel bir sonuç</p>
                    <div class="service-info">
                        <span class="price">₺200</span>
                        <span class="duration">⏱️ 60 dakika</span>
                    </div>
                    <button class="btn btn-secondary">Randevu Al</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Nail & Lash Studio. Tüm Hakları Saklıdır.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script src="../js/services.js"></script>
</body>
</html>
